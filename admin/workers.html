<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>ASHA Workers | Admin Dashboard</title>
  <link rel="stylesheet" href="admin.css" />
</head>
<body>

<!-- ================= NAVBAR ================= -->
<div class="navbar">
  <div class="nav-left">AASHA Connect – Admin</div>
  <div class="nav-right">
    <a href="dashboard.html">Dashboard</a>
    <a href="workers.html" class="active">ASHA Workers</a>
    <a href="#">Families</a>
    <a href="reports.html">Reports</a>z
    <a href="login.html">Logout</a>
  </div>
</div>

<!-- ================= BACKGROUND ================= -->
<div class="admin-bg">
  <div class="overlay"></div>

  <!-- ================= CONTENT ================= -->
  <div class="admin-content dashboard-container">

    <h1>ASHA Workers</h1>
    <p class="subtitle">Manage and monitor registered ASHA workers</p>

    <!-- ===== ADD ASHA WORKER FORM ===== -->
    <div class="add-worker-box">
      <h3>Add New ASHA Worker</h3>

      <form id="addWorkerForm">
        <input
          type="text"
          id="workerName"
          placeholder="ASHA Worker Name"
          required
        />

        <input
          type="text"
          id="workerPhone"
          placeholder="Phone Number"
          required
        />

        <input
          type="text"
          id="workerArea"
          placeholder="Assigned Area"
          required
        />

        <button type="submit">Add Worker</button>
      </form>
    </div>

    <!-- ===== WORKERS TABLE ===== -->
    <table class="data-table">
      <thead>
        <tr>
          <th>Name</th>
          <th>Phone</th>
          <th>Area</th>
          <th>Status</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="workerTable">
        <!-- Data loaded from backend -->
      </tbody>
    </table>

  </div>
</div>

<script src="workers.js"></script>
<script src="status-banner.js"></script>
</body>
</html>
