<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Login | AASHA Connect</title>
  <link rel="stylesheet" href="auth.css">
</head>
<body>

  <!-- NAVBAR -->
<div class="navbar">
  <div class="nav-left">AASHA Connect</div>
  <div class="nav-right">
    <a href="/admin/dashboard.html">Dashboard</a>
    <a href="workers.html">Add Aasha</a>
    <a href="#">View Families</a>
    <a href="#">Scan QR</a>

  </div>

<div class="auth-bg">
  <div class="overlay"></div>

  <div class="auth-box">
    <h2>Admin Login</h2>
    <p class="subtitle">Authorized access only</p>

    <form onsubmit="loginAdmin(event)">
  <input
    type="text"
    id="phone"
    placeholder="Phone Number"
    required
  />

  <input
    type="password"
    id="password"
    placeholder="Password"
    required
  />

  <button type="submit">Login</button>

  <p class="switch">
    New Admin?
    <a href="registration.html">Create Account</a>
  </p>
</form>

<p id="msg"></p>
<script src="login.js"></script>
<script src="status-banner.js"></script>
  </div>
</div>

</body>
</html>
