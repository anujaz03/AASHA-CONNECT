<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="worker.css">
    <title>Add New Family</title>
    <link rel="icon" href="/favicon.ico" />

</head>
<body>


<div class="navbar">
    <div class="logo">AASHA Connect</div>

    <nav>
        <a href="dashboard.html">Dashboard</a>
        <a href="add-family.html">Add Family</a>
        <a href="families.html">Families</a>
        <a href="qr.html">Scan QR</a>
        <a href="login.html" class="logout">Logout</a>
    </nav>
</div>

<div class="center-box">
    <h2>Add New Family</h2>

   <div class="field-with-mic">
  <input type="text" id="familyName" placeholder="Family Head Name *">
  <button type="button" class="mic-btn" onclick="startVoiceFor('familyName')">🎤</button>
</div>

<div class="field-with-mic">
  <input type="text" id="address" placeholder="Address *">
  <button type="button" class="mic-btn" onclick="startVoiceFor('address')">🎤</button>
</div>

<div class="field-with-mic">
  <input type="number" id="contact" placeholder="Contact Number *">
  <button type="button" class="mic-btn" onclick="startVoiceFor('contact', true)">🎤</button>
</div>

<div class="field-with-mic">
  <textarea id="notes" placeholder="Family Details (Short Notes)"></textarea>
  <button type="button" class="mic-btn" onclick="startVoiceFor('notes')">🎤</button>
</div>


   
<div class="language">
        <select id="voiceLang">
    <option value="en-IN">English</option>
    <option value="hi-IN">Hindi</option>
    <option value="mr-IN">Marathi</option>
</select>
</div>






<button type="button" onclick="readFamilyDetails()" class="btn">
🔊 Read Details
</button>

    <button id="saveFamilyBtn" class="btn btn-primary">
  Save Family 
</button>

</div>

<script src="./js/db.js"></script>
<script src="./js/sync.js"></script>
<script src="worker.js"></script>



</body>
</html>
