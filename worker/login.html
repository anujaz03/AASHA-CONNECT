<!DOCTYPE html>
<html>
<head>

    <title>Aasha Worker Login</title>
    <link rel="icon" href="/favicon.ico" />
    <script src="js/auth-guard.js"></script>
</head>
<body>

<div class="navbar">
    <div class="logo">AASHA <span>Connect</span></div>
    <nav>
        <a href="../index.html">Return to Home</a>
    </nav>
</div>

<div class="center-box">
    <h2>Worker Login</h2>

    <input type="text" id="workerId" placeholder="Worker ID" required>

        Login

    <div id="msg" style="color: #ff2d75; font-size: 13px; margin-top: 15px; font-weight: bold; text-align: center;"></div>
</div>

<script src="/config.js"></script>
<script src="js/login.js"></script>
<script src="js/status-banner.js"></script>
</body>
</html>
